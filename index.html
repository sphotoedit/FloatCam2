<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloatCam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #f0f0f2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 32px 16px;
}

/* ── Bubble ── */
.bubble {
  position: relative;
  width: 260px; height: 260px;
  background: #111;
  overflow: hidden;
  box-shadow: 0 16px 56px rgba(0,0,0,0.28);
  border-radius: 30px;
  transition:
    border-radius .34s cubic-bezier(.4,0,.2,1),
    width .34s cubic-bezier(.4,0,.2,1),
    height .34s cubic-bezier(.4,0,.2,1);
  cursor: grab;
}
.bubble:active { cursor: grabbing; }
.bubble.s-rounded  { border-radius: 30px; width: 260px; height: 260px; }
.bubble.s-circle   { border-radius: 50%;  width: 260px; height: 260px; }
.bubble.s-portrait { border-radius: 22px; width: 182px; height: 260px; }

.bubble canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%; display: block;
}

.cam-ph {
  position: absolute; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: rgba(255,255,255,0.25); font-size: 11px; font-weight: 500;
  pointer-events: none;
}
.cam-ph svg { width: 32px; height: 32px; opacity: 0.3; }

/* PiP btn */
.pip-btn {
  position: absolute; top: 8px; right: 8px;
  width: 28px; height: 28px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: none; border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; z-index: 10;
  opacity: 0; pointer-events: none;
  transition: opacity .18s, background .13s, transform .1s;
}
.pip-btn.on      { opacity:1; pointer-events:all; }
.pip-btn:hover   { background:rgba(0,0,0,.82); transform:scale(1.08); }
.pip-btn:active  { transform:scale(.92); }
.pip-btn.active  { background:rgba(220,38,38,.8); }
.pip-btn svg     { width:13px; height:13px; }

/* ── Panel ── */
.panel { display:flex; flex-direction:column; align-items:center; gap:14px; }

.start-btn {
  border:none; background:#111; color:#fff;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
  border-radius:100px; padding:11px 32px; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  transition:background .15s, transform .1s;
}
.start-btn:hover { background:#222; }
.start-btn:active { transform:scale(.97); }
.start-btn.on { background:#dc2626; }
.start-btn.on:hover { background:#b91c1c; }
.btn-dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,.5); transition:background .2s;
}
.start-btn.on .btn-dot { background:#fff; animation:blink 1.1s ease-in-out infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.shape-strip {
  display:flex; align-items:center; gap:6px;
  background:rgba(0,0,0,.07); border-radius:100px; padding:5px 8px;
}
.shp {
  width:38px; height:38px; border:none; background:transparent;
  border-radius:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#888; transition:background .13s, color .13s;
}
.shp:hover { background:rgba(0,0,0,.07); color:#333; }
.shp.active { background:#fff; color:#111; box-shadow:0 1px 5px rgba(0,0,0,.13); }
.shp svg { width:20px; height:20px; }

.extras { display:flex; align-items:center; gap:8px; }
.xbtn {
  border:1.5px solid rgba(0,0,0,.12); background:rgba(255,255,255,.7);
  border-radius:9px; padding:7px 13px;
  font-family:'Inter',sans-serif; font-size:11px; font-weight:500; color:#555;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all .13s; backdrop-filter:blur(4px);
}
.xbtn:hover  { background:rgba(255,255,255,.9); color:#111; }
.xbtn.active { background:#111; border-color:#111; color:#fff; }
.xbtn svg { width:12px; height:12px; }

.cam-wrap { position:relative; }
select {
  appearance:none; outline:none;
  border:1.5px solid rgba(0,0,0,.12); background:rgba(255,255,255,.7);
  border-radius:9px; padding:7px 28px 7px 11px;
  font-family:'Inter',sans-serif; font-size:11px; font-weight:500; color:#444;
  cursor:pointer; max-width:170px; backdrop-filter:blur(4px);
  transition:border-color .13s;
}
select:hover { border-color:rgba(0,0,0,.25); }
.sarrow {
  position:absolute; right:9px; top:50%; transform:translateY(-50%);
  pointer-events:none; color:#888;
}

.hint { font-size:10px; color:#aaa; letter-spacing:.02em; }

.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(10,10,10,.88); color:#fff;
  font-size:12px; font-weight:500; padding:9px 18px; border-radius:100px;
  opacity:0; pointer-events:none; z-index:9999;
  transition:opacity .2s, transform .2s; white-space:nowrap;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bubble s-rounded" id="bubble">
  <canvas id="cv"></canvas>
  <div class="cam-ph" id="ph">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
    </svg>
    <span>Start Camera</span>
  </div>
  <button class="pip-btn" id="pipBtn" onclick="togglePiP()" title="Float transparent (P)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3.5" width="16" height="10" rx="2.5"/>
      <rect x="10.5" y="9" width="7" height="4.5" rx="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </button>
</div>

<div class="panel">
  <button class="start-btn" id="startBtn" onclick="toggleCam()">
    <div class="btn-dot"></div>
    <span id="startLbl">Start Camera</span>
  </button>

  <div class="shape-strip">
    <button class="shp active" data-shape="rounded" onclick="setShape(this)" title="Rounded">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="3" width="14" height="14" rx="5"/>
      </svg>
    </button>
    <button class="shp" data-shape="circle" onclick="setShape(this)" title="Circle">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="10" cy="10" r="7"/>
      </svg>
    </button>
    <button class="shp" data-shape="portrait" onclick="setShape(this)" title="Portrait">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="5.5" y="2" width="9" height="16" rx="3.5"/>
      </svg>
    </button>
  </div>

  <div class="extras">
    <button class="xbtn active" id="mirBtn" onclick="toggleMirror()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M7 1v12M2 4.5L.5 7 2 9.5M12 4.5L13.5 7 12 9.5"/>
      </svg>
      Mirror
    </button>
    <div class="cam-wrap">
      <select id="camSel" onchange="switchCam()">
        <option value="">Loading…</option>
      </select>
      <div class="sarrow">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="hint">Space · start/stop &nbsp;|&nbsp; P · float &nbsp;|&nbsp; M · mirror</div>
</div>

<!-- Hidden source elements -->
<video id="vid" autoplay playsinline muted webkit-playsinline
  style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;"></video>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let stream   = null;
let mirrored = true;
let shape    = 'rounded';   // 'rounded' | 'circle' | 'portrait'
let raf      = null;
let pipWin   = null;        // popup window reference
let pipOn    = false;

const vid      = document.getElementById('vid');
const cv       = document.getElementById('cv');
const bubble   = document.getElementById('bubble');
const ph       = document.getElementById('ph');
const pipBtn   = document.getElementById('pipBtn');
const startBtn = document.getElementById('startBtn');
const startLbl = document.getElementById('startLbl');
const mirBtn   = document.getElementById('mirBtn');
const camSel   = document.getElementById('camSel');

/* ══════════════════════════════════════
   CAMERA LIST
══════════════════════════════════════ */
(async () => {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    tmp.getTracks().forEach(t => t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d => d.kind === 'videoinput');
    camSel.innerHTML = cams.map((c,i) =>
      `<option value="${c.deviceId}">${c.label||'Camera '+(i+1)}</option>`
    ).join('') || '<option>No camera</option>';
  } catch { camSel.innerHTML = '<option>No access</option>'; }
})();

/* ══════════════════════════════════════
   START / STOP
══════════════════════════════════════ */
async function toggleCam() { stream ? stopCam() : await startCam(); }

async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        width:{ideal:1280}, height:{ideal:720}, facingMode:'user',
        ...(camSel.value ? {deviceId:{exact:camSel.value}} : {})
      }, audio: false
    });
    vid.srcObject = stream;
    await vid.play();
    ph.style.display   = 'none';
    cv.style.display   = 'block';
    pipBtn.classList.add('on');
    startBtn.classList.add('on');
    startLbl.textContent = 'Stop Camera';
    startDraw();
    toast('Camera on ✓');
  } catch(e) {
    toast(e.name==='NotAllowedError' ? 'Camera denied — allow in browser settings' : 'Error: '+e.message);
  }
}

function stopCam() {
  cancelAnimationFrame(raf); raf = null;
  stream?.getTracks().forEach(t => t.stop());
  stream = null; vid.srcObject = null;
  clearCanvas(cv);
  ph.style.display = 'flex';
  cv.style.display = 'none';
  pipBtn.classList.remove('on','active');
  startBtn.classList.remove('on');
  startLbl.textContent = 'Start Camera';
  closePiP();
  toast('Camera off');
}

async function switchCam() {
  if (!stream) return;
  stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video:{deviceId:{exact:camSel.value},width:{ideal:1280},height:{ideal:720}},audio:false
  }).catch(()=>null);
  if (stream) { vid.srcObject = stream; await vid.play(); toast('Camera switched'); }
}

/* ══════════════════════════════════════
   DRAW LOOP — main bubble canvas
══════════════════════════════════════ */
function startDraw() {
  const ctx = cv.getContext('2d');
  function frame() {
    raf = requestAnimationFrame(frame);
    if (!stream || vid.readyState < 2) return;
    const bw = bubble.clientWidth, bh = bubble.clientHeight;
    if (cv.width!==bw||cv.height!==bh){cv.width=bw;cv.height=bh;}
    paintShaped(ctx, bw, bh, shape, mirrored, false);
  }
  frame();
}

/* ══════════════════════════════════════
   PAINT — draws shaped frame onto any ctx
   transparent=true → clearRect instead of black fill
   (used for popup so OS composites transparency)
══════════════════════════════════════ */
function paintShaped(ctx, w, h, shp, mir, transparent) {
  ctx.clearRect(0, 0, w, h);

  if (!transparent) {
    /* fill black for main bubble — no white flash */
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);
  }

  ctx.save();
  buildClipPath(ctx, w, h, shp);
  ctx.clip();
  if (mir) { ctx.translate(w,0); ctx.scale(-1,1); }
  /* cover-fit */
  const vw = vid.videoWidth||w, vh = vid.videoHeight||h;
  const sc = Math.max(w/vw, h/vh);
  const dw = vw*sc, dh = vh*sc;
  ctx.drawImage(vid, (w-dw)/2, (h-dh)/2, dw, dh);
  ctx.restore();
}

function buildClipPath(ctx, w, h, shp) {
  ctx.beginPath();
  if (shp === 'circle') {
    ctx.arc(w/2, h/2, Math.min(w,h)/2, 0, Math.PI*2);
  } else {
    const r = shp === 'portrait' ? Math.min(22, w*0.13) : Math.min(30, w*0.12);
    rrect(ctx, 0, 0, w, h, r);
  }
  ctx.closePath();
}

function rrect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) { ctx.roundRect(x,y,w,h,r); return; }
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
}

function clearCanvas(c) { c.getContext('2d').clearRect(0,0,c.width,c.height); }

/* ══════════════════════════════════════
   SHAPE  — realtime, updates PiP instantly
══════════════════════════════════════ */
function setShape(btn) {
  document.querySelectorAll('.shp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  shape = btn.dataset.shape;
  bubble.classList.remove('s-rounded','s-circle','s-portrait');
  bubble.classList.add('s-'+shape);
  /* PiP popup: resize window to match new shape & the draw loop already uses new shape */
  if (pipWin && !pipWin.closed) resizePopup();
}

/* ══════════════════════════════════════
   MIRROR
══════════════════════════════════════ */
function toggleMirror() {
  mirrored = !mirrored;
  mirBtn.classList.toggle('active', mirrored);
}

/* ══════════════════════════════════════
   PiP — transparent popup window
   Key trick: CSS background:transparent + canvas clearRect
   so the OS sees through to whatever is underneath.
   Works on macOS Chrome & Safari.
══════════════════════════════════════ */
async function togglePiP() {
  if (!stream) { toast('Start camera first'); return; }
  if (pipOn)   { closePiP(); return; }

  /* Try native PiP first (Chrome) — it uses the pipCv stream */
  if (document.pictureInPictureEnabled) {
    await tryNativePiP();
  } else {
    openTransparentPopup();
  }
}

/* ── Native PiP via hidden canvas stream ── */
async function tryNativePiP() {
  try {
    /* Create a hidden canvas + video just for native PiP feed */
    const pCv  = document.createElement('canvas');
    const pVid = document.createElement('video');
    pCv.width = pCv.height = 560;
    pVid.muted = true;
    pVid.style.cssText = 'position:absolute;left:-9999px;width:1px;height:1px;';
    document.body.appendChild(pVid);

    /* Draw loop into pCv — transparent background, shaped clip */
    let pRaf;
    function pFrame() {
      pRaf = requestAnimationFrame(pFrame);
      if (!stream || vid.readyState < 2) return;
      const w = pCv.width, h = pCv.height;
      paintShaped(pCv.getContext('2d'), w, h, shape, mirrored, true);
    }
    pFrame();

    pVid.srcObject = pCv.captureStream(30);
    await pVid.play();
    await pVid.requestPictureInPicture();

    pipOn = true;
    pipBtn.classList.add('active');
    toast('📺 Transparent shape floating!');

    pVid.addEventListener('leavepictureinpicture', () => {
      cancelAnimationFrame(pRaf);
      pVid.remove();
      pipOn = false;
      pipBtn.classList.remove('active');
      toast('PiP closed');
    }, { once: true });

    /* Keep shape updates flowing — the pFrame loop reads `shape` live */
    /* Store cleanup ref */
    pipWin = { _pRaf: pRaf, _pVid: pVid, _pCv: pCv, close: () => {
      cancelAnimationFrame(pRaf);
      pVid.remove();
      try { document.exitPictureInPicture(); } catch {}
    }};

  } catch(e) {
    console.error('Native PiP failed:', e);
    openTransparentPopup();
  }
}

/* ── Transparent popup fallback (Safari / Firefox) ── */
function openTransparentPopup() {
  const pw = shape==='portrait' ? 210 : 300;
  const ph = shape==='portrait' ? 300 : 300;

  const pop = window.open('', 'floatcam',
    `width=${pw},height=${ph},` +
    `resizable=yes,scrollbars=no,menubar=no,` +
    `toolbar=no,location=no,status=no`
  );
  if (!pop) { toast('Allow popups for floating window'); return; }

  /* Write a transparent page — ONLY the canvas, zero chrome */
  pop.document.write(`<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<style>
  html,body{
    margin:0;padding:0;
    background:transparent !important;
    overflow:hidden;
    width:100%;height:100%;
    -webkit-app-region:drag;
  }
  canvas{
    display:block;
    width:100%;height:100%;
    background:transparent;
  }
</style>
</head><body><canvas id="c"></canvas></body></html>`);
  pop.document.close();

  pipWin = pop;
  pipOn  = true;
  pipBtn.classList.add('active');
  toast('📺 Transparent shape floating!');

  let pRaf;
  function popFrame() {
    if (pop.closed) {
      cancelAnimationFrame(pRaf);
      pipOn = false; pipWin = null;
      pipBtn.classList.remove('active');
      return;
    }
    pRaf = pop.requestAnimationFrame(popFrame);
    const c = pop.document.getElementById('c');
    if (!c) return;
    const w = pop.innerWidth, h = pop.innerHeight;
    if (c.width!==w||c.height!==h){c.width=w;c.height=h;}
    /* transparent=true → clearRect only, no black fill → OS shows through */
    paintShaped(c.getContext('2d'), w, h, shape, mirrored, true);
  }
  pop.requestAnimationFrame(popFrame);
  pop.addEventListener('beforeunload', () => {
    pipOn = false; pipWin = null;
    pipBtn.classList.remove('active');
  });
}

function resizePopup() {
  if (!pipWin || pipWin.closed || typeof pipWin.resizeTo !== 'function') return;
  const pw = shape==='portrait' ? 210 : 300;
  const ph = shape==='portrait' ? 300 : 300;
  try { pipWin.resizeTo(pw, ph); } catch {}
}

function closePiP() {
  if (pipWin) {
    if (typeof pipWin.close === 'function') pipWin.close();
    pipWin = null;
  }
  try { document.exitPictureInPicture(); } catch {}
  pipOn = false;
  pipBtn.classList.remove('active');
}

/* ══════════════════════════════════════
   KEYBOARD
══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (['SELECT','INPUT'].includes(e.target.tagName)) return;
  if (e.code==='Space') { e.preventDefault(); toggleCam(); }
  if (e.code==='KeyP')  togglePiP();
  if (e.code==='KeyM')  toggleMirror();
});

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(()=>el.classList.remove('show'), 2600);
}
</script>
</body>
</html>
